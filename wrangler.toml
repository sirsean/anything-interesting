name = "anything-interesting"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# M6: serve the Vite-built SPA from the same Worker. The plugin emits SPA assets
# to dist/client/ and a Worker bundle (with an output wrangler.json) to
# dist/anything-interesting/; `wrangler deploy` consumes that output config.
# `not_found_handling = single-page-application` falls back to index.html for
# client-side routes; `run_worker_first` keeps `/api/*` (and `/health`,
# `/interactions`) flowing through the Worker without an asset lookup.
[assets]
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/health", "/interactions"]

[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "anything-interesting"
database_id = "1c9da3d5-43b2-4a08-b7fa-279b7216695a"

[[kv_namespaces]]
binding = "CONFIG"
id = "cd4babf1d62b41e286d1972de115b054"

# Headline index: `npx wrangler vectorize create headlines --dimensions=1024 --metric=cosine`
[[vectorize]]
binding = "HEADLINES"
index_name = "headlines"

# Markets index: `npx wrangler vectorize create markets --dimensions=1024 --metric=cosine`
[[vectorize]]
binding = "MARKETS"
index_name = "markets"

[ai]
binding = "AI"
remote = true

[vars]
# Set in dashboard / `wrangler vars put AI_GATEWAY_ID` to route Workers AI through AI Gateway.
AI_GATEWAY_ID = ""
# Optional override for final cluster judgment model (Workers AI slug), e.g. when swapping via AI Gateway.
JUDGMENT_MODEL = ""
